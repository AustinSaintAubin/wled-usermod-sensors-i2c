name: build

# Builds this out-of-tree usermod into WLED so API drift (WLED changing its
# usermod interface) is caught early. Mirrors the local symlink verification.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Build against WLED main (catches drift) — add release branches/tags here.
        wled_ref: [main]
        # default = MQTT on; no_mqtt exercises the WLED_DISABLE_MQTT code path,
        # which is conditionally compiled and would otherwise never be built.
        variant: [default, no_mqtt]
    steps:
      - name: Checkout usermod
        uses: actions/checkout@v4
        with:
          # Folder name must match the library.json name so PlatformIO registers it
          # as "wled-usermod-sensors-i2c" (recognized via the wled- prefix).
          path: wled-usermod-sensors-i2c

      - name: Check version sync (.cpp vs library.json)
        run: |
          cpp_ver=$(grep -oP '#define SENSORS_I2C_VERSION "\K[^"]+' wled-usermod-sensors-i2c/usermod_v2_sensors_i2c.cpp)
          json_ver=$(python3 -c "import json; print(json.load(open('wled-usermod-sensors-i2c/library.json'))['version'])")
          echo "cpp=$cpp_ver library.json=$json_ver"
          test "$cpp_ver" = "$json_ver"

      - name: Checkout WLED (${{ matrix.wled_ref }})
        uses: actions/checkout@v4
        with:
          repository: wled/WLED
          ref: ${{ matrix.wled_ref }}
          path: wled

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ matrix.wled_ref }}-${{ hashFiles('wled-usermod-sensors-i2c/library.json') }}
          restore-keys: pio-${{ matrix.wled_ref }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Configure WLED to include this usermod
        run: |
          cat > wled/platformio_override.ini <<'EOF'
          [env:sensors_i2c_ci]
          extends = env:esp32dev
          custom_usermods = symlink://${{ github.workspace }}/wled-usermod-sensors-i2c
          build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
            -DARDUINO_USB_CDC_ON_BOOT=0
            -D I2CSDAPIN=21
            -D I2CSCLPIN=22 ${{ matrix.variant == 'no_mqtt' && '-D WLED_DISABLE_MQTT' || '' }}
          EOF

      - name: Build
        run: |
          cd wled
          pio run -e sensors_i2c_ci 2>&1 | tee build.log
          echo "--- verifying the usermod linked into the binary ---"
          grep -q "usermod libraries found in binary: wled-usermod-sensors-i2c" build.log
